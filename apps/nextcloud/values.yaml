image:
  flavor: apache

nextcloud:
  host: nextcloud.local
  username: admin
  password: change-me-now
  email: admin@example.local

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: local-selfsigned
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/redirect-entry-point: https
  tls:
    - secretName: nextcloud-tls
      hosts:
        - nextcloud.local

persistence:
  enabled: true
  storageClass: local-path
  accessMode: ReadWriteOnce
  size: 20Gi

internalDatabase:
  enabled: false

externalDatabase:
  enabled: true
  type: mysql
  host: nextcloud-mariadb
  database: nextcloud
  user: nextcloud
  password: change-db-password

mariadb:
  enabled: true
  architecture: standalone
  auth:
    database: nextcloud
    username: nextcloud
    password: change-db-password
    rootPassword: change-root-password
  primary:
    persistence:
      enabled: true
      storageClass: local-path
      size: 8Gi
  # image:
  #   registry: docker.io
  #   repository: bitnamilegacy/mariadb
  #   tag: 11.3.2-debian-12-r1

redis:
  enabled: true
  auth:
    password: change-redis-password
  # image:
  #   registry: docker.io
  #   repository: bitnamilegacy/redis
  #   tag: 7.2.4-debian-12-r9
  master:
    persistence:
      enabled: true
  replica:
    persistence:
      enabled: true
