apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: test-alert
  namespace: monitoring
spec:
  groups:
    - name: test
      rules:
        - alert: AlwaysFiringTest
          expr: vector(1)
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: Test alert firing
            description: This is a test alert to verify alerting pipeline