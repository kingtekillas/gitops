grafana:
  adminPassword: change-me-now

  persistence:
    enabled: true
    storageClassName: local-path
    accessModes:
      - ReadWriteOnce
    size: 5Gi

  service:
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: local-selfsigned
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
      traefik.ingress.kubernetes.io/redirect-entry-point: https
    hosts:
      - grafana.local
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.local

  defaultDashboardsEnabled: true

crds:
  enabled: true

nodeExporter:
  # Enabled intentionally so Prometheus can scrape host/node metrics.
  enabled: true

prometheus:
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: local-selfsigned
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
      traefik.ingress.kubernetes.io/redirect-entry-point: https
    hosts:
      - prometheus.local
    tls:
      - secretName: prometheus-tls
        hosts:
          - prometheus.local
  prometheusSpec:
    retention: 3d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi

alertmanager:
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: local-selfsigned
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
      traefik.ingress.kubernetes.io/redirect-entry-point: https
    hosts:
      - alertmanager.local
    tls:
      - secretName: alertmanager-tls
        hosts:
          - alertmanager.local

  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi

  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: telegram
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h

    receivers:
      - name: telegram
        telegram_configs:
          - bot_token: "ommited"
            chat_id: "ommited"
            send_resolved: true
            message: |
              🔥 {{ .CommonAnnotations.summary }}

              {{ .CommonAnnotations.description }}

              Severity: {{ .CommonLabels.severity }}
